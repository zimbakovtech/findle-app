name: Frontend CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-frontend:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run linter
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000

      - name: CI summary
        if: always()
        run: |
          echo "## Frontend CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | react-hooks, react-refresh, typescript-eslint |" >> $GITHUB_STEP_SUMMARY
          echo "| Vite build | TypeScript + Vite 5, strict TS |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | 20 |" >> $GITHUB_STEP_SUMMARY
