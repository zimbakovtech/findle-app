apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: findle
  labels:
    app: backend
    app.kubernetes.io/part-of: findle
type: Opaque
# Values are base64-encoded. To encode: echo -n 'value' | base64
# Replace all placeholder values before deploying.
data:
  # Generate a strong random key: openssl rand -hex 32 | base64
  # echo -n 'your-strong-secret-key-here' | base64
  SECRET_KEY: eW91ci1zdHJvbmctc2VjcmV0LWtleS1oZXJl
  # echo -n 'changeme' | base64  ← replace with a strong password
  FIRST_SUPERUSER_PASSWORD: Y2hhbmdlbWU=
