apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: findle
  labels:
    app: postgres
    app.kubernetes.io/part-of: findle
type: Opaque
# Values are base64-encoded. To encode: echo -n 'value' | base64
# Replace all placeholder values before deploying.
data:
  # echo -n 'postgres' | base64
  POSTGRES_USER: cG9zdGdyZXM=
  # echo -n 'changeme' | base64  ← replace with a strong password
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  # echo -n 'findle_db' | base64
  POSTGRES_DB: ZmluZGxlX2Ri
  # Full async connection URL — update password to match POSTGRES_PASSWORD above
  # echo -n 'postgresql+asyncpg://postgres:changeme@postgres:5432/findle_db' | base64
  DATABASE_URL: cG9zdGdyZXNxbCthc3luY3BnOi8vcG9zdGdyZXM6Y2hhbmdlbWVAcG9zdGdyZXM6NTQzMi9maW5kbGVfZGI=
