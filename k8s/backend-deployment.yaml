apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: findle
  labels:
    app: backend
    app.kubernetes.io/part-of: findle
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: db-migrate
          image: zimbakovtech/findle-backend:latest
          imagePullPolicy: Always
          command: ["sh", "-c"]
          args:
            - |
              cd /app
              poetry run alembic upgrade head
              PYTHONPATH=/app poetry run python -m src.utils.create_superuser
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: FIRST_SUPERUSER_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: FIRST_SUPERUSER_USERNAME
            - name: FIRST_SUPERUSER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: FIRST_SUPERUSER_EMAIL
            - name: FIRST_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: FIRST_SUPERUSER_PASSWORD
      containers:
        - name: backend
          image: zimbakovtech/findle-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SECRET_KEY
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: FIRST_SUPERUSER_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: FIRST_SUPERUSER_USERNAME
            - name: FIRST_SUPERUSER_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: FIRST_SUPERUSER_EMAIL
            - name: FIRST_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: FIRST_SUPERUSER_PASSWORD
            - name: SEED_DATA
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: SEED_DATA
            - name: ROOT_PATH
              valueFrom:
                configMapKeyRef:
                  name: backend-configmap
                  key: ROOT_PATH
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
